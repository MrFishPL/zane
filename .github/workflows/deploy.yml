name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: GH_TOKEN,DOTENV
          script: |
            set -e

            APP_DIR="/opt/zane"
            REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/MrFishPL/zane.git"

            # First run: install Docker if missing
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            # First run: clone repo
            if [ ! -d "$APP_DIR" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Configure git to use token for this repo
            git remote set-url origin "$REPO_URL"

            # Pull latest code
            git fetch origin master
            git reset --hard origin/master

            # Write .env from secret
            printf '%s\n' "$DOTENV" > .env

            # Install Loki Docker logging driver if missing
            if ! docker plugin ls --format '{{.Name}}' | grep -q loki; then
              docker plugin install grafana/loki-docker-driver:latest --alias loki --grant-all-permissions || true
            fi

            # Build and deploy (with Loki logging overlay)
            docker compose -f docker-compose.yml -f docker-compose.override.loki.yml down --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose.override.loki.yml up --build -d

            # Wait for health checks
            echo "Waiting for services to start..."
            sleep 15
            docker compose -f docker-compose.yml -f docker-compose.override.loki.yml ps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOTENV: ${{ secrets.DOTENV }}
