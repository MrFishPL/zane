services:
  # --- Infrastructure ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Observability ---
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - app-network
    depends_on:
      loki:
        condition: service_healthy

  # --- LiteLLM Proxy ---
  litellm-proxy:
    build: ./litellm-proxy
    ports:
      - "4000:4000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MCP Servers ---
  mcp-nexar:
    build: ./mcp-nexar
    ports:
      - "8001:8001"
    environment:
      NEXAR_CLIENT_ID: ${NEXAR_CLIENT_ID}
      NEXAR_CLIENT_SECRET: ${NEXAR_CLIENT_SECRET}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-snapmagic:
    build: ./mcp-snapmagic
    ports:
      - "8002:8002"
    environment:
      LITELLM_BASE_URL: ${LITELLM_BASE_URL}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-documents:
    build: ./mcp-documents
    ports:
      - "8003:8003"
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - app-network
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-websearch:
    build: ./mcp-websearch
    ports:
      - "8004:8004"
    environment:
      LITELLM_BASE_URL: ${LITELLM_BASE_URL}
    networks:
      - app-network
    depends_on:
      litellm-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-export:
    build: ./mcp-export
    ports:
      - "8005:8005"
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - app-network
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Core Services ---
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      REDIS_URL: ${REDIS_URL}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy

  agent:
    build: ./agent
    environment:
      REDIS_URL: ${REDIS_URL}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL}
      AGENT_MAX_CONCURRENT_TASKS: ${AGENT_MAX_CONCURRENT_TASKS:-50}
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
      mcp-nexar:
        condition: service_healthy
      mcp-snapmagic:
        condition: service_healthy
      mcp-documents:
        condition: service_healthy
      mcp-websearch:
        condition: service_healthy
      mcp-export:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
  minio-data:
  loki-data:
  grafana-data:
